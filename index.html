<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">🎧 Harmora</div>
    <a class="nav-link active" href="#">Explore</a>
    <a class="nav-link" href="#">Artists</a>
    <a class="nav-link" href="#">Dashboard</a>
    <a class="nav-link" href="#">Upload</a>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <section class="hero">
      <h1>Discover the Sound of Tomorrow</h1>
      <p>Empowering artists to earn and fans to connect through music.</p>
    </section>

    <h2 class="section-title">Trending Tracks</h2>
    <div id="songs" class="grid"></div>

    <h2 class="section-title">Featured Artists</h2>
    <div id="artists" class="grid"></div>
  </main>
</div>

<!-- Player -->
<div id="player">
  <div id="trackName">No track playing</div>
  <div class="player-controls">
    <button class="btn btn-secondary" onclick="togglePlay()">Play/Pause</button>
  </div>
  <audio id="audio"></audio>
</div>
