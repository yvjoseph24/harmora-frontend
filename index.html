<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmora</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0a0015, #000);
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
}

.logo {
  color: #00f5ff;
  font-size: 22px;
  font-weight: bold;
}

.nav a {
  margin-left: 15px;
  color: #aaa;
  text-decoration: none;
  cursor: pointer;
}

.nav a:hover {
  color: #00f5ff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

/* SECTIONS */
.section {
  padding: 40px 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,245,255,0.2);
  padding: 15px;
  border-radius: 12px;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(90deg,#00f5ff,#b400ff);
  cursor: pointer;
  font-weight: bold;
}

/* LOGIN */
.loginBox {
  max-width: 400px;
  margin: auto;
}

/* PLAYER */
#playerBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(10,0,25,0.95);
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-top: 1px solid #00f5ff33;
}

#playerBar button {
  width: auto;
  padding: 6px 12px;
  border-radius: 20px;
}

#trackName {
  flex: 1;
  color: #00f5ff;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">🎧 Harmora</div>
  <div>
    <a href="#explore">Explore</a>
    <a href="#artists">Artists</a>
    <a href="#upload">Upload</a>
    <a href="#login">Login</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Build. Drop. Earn.</h1>
  <p>Music marketplace for creators</p>
</div>

<!-- EXPLORE / MARKETPLACE -->
<section id="explore" class="section">
  <h2>🔥 Marketplace</h2>
  <div id="songs" class="grid"></div>
</section>

<!-- ARTISTS -->
<section id="artists" class="section">
  <h2>🎤 Artist Profile</h2>

  <div class="card">
    <input id="artistName" placeholder="Artist Name" style="width:100%;padding:10px;">
    <input id="artistBio" placeholder="Bio" style="width:100%;padding:10px;margin-top:5px;">
    <button onclick="createArtist()">Create Artist Profile</button>
  </div>

  <div id="artistList" class="grid"></div>
</section>

<!-- UPLOAD -->
<section id="upload" class="section">
  <h2>🎧 Upload Music</h2>

  <div class="card">
    <input id="songTitle" placeholder="Song Title" style="width:100%;padding:10px;">
    <input id="songPrice" placeholder="Price" type="number" style="width:100%;padding:10px;margin-top:5px;">
    <input id="songFile" type="file" style="margin-top:10px;">
    <button onclick="uploadSong()">Upload</button>
  </div>
</section>

<!-- LOGIN -->
<section id="login" class="section">
  <h2>🔐 Login</h2>

  <div class="loginBox card">
    <input id="email" placeholder="Email" style="width:100%;padding:10px;">
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-top:5px;">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</section>

<footer style="text-align:center;color:#444;padding:20px;">
© 2026 Harmora
</footer>

<!-- PLAYER -->
<div id="playerBar">
  <div id="trackName">No track selected</div>
  <button onclick="togglePlay()">▶</button>
  <audio id="audio"></audio>
</div>

<script src="app.js"></script>
</body>
</html>
