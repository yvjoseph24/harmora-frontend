<!DOCTYPE html>
<html>
<head>
  <title>Harmora</title>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b0b10;
      color: white;
      padding: 20px;
    }

    input, button {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 250px;
    }

    button {
      cursor: pointer;
    }

    .card {
      padding: 10px;
      border: 1px solid #333;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Harmora</h1>

<!-- AUTH -->
<h2>Auth</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<hr>

<!-- UPLOAD -->
<h2>Upload Song</h2>
<input id="title" placeholder="Song Title">
<input id="price" placeholder="Price">
<input id="file" type="file">

<button onclick="uploadSong()">Upload</button>

<hr>

<!-- FEED -->
<h2>Feed</h2>
<div id="feed"></div>

<script>
console.log("Harmora Loaded");

// 🔥 INIT SUPABASE (ONLY ONCE EVER)
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

// ---------------- AUTH ----------------
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) return alert(error.message);
  alert("Signup success");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);
  alert("Login success");
}

// ---------------- UPLOAD ----------------
async function uploadSong() {
  const title = document.getElementById("title").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Select a file");

  const user = await supabase.auth.getUser();

  if (!user.data.user) {
    return alert("You must be logged in");
  }

  const fileName = Date.now() + "-" + file.name;

  // upload file
  const { error: uploadError } = await supabase
    .storage
    .from("music")
    .upload(fileName, file);

  if (uploadError) return alert(uploadError.message);

  const url = supabase.storage
    .from("music")
    .getPublicUrl(fileName).data.publicUrl;

  // save to DB
  const { error: dbError } = await supabase
    .from("songs")
    .insert({
      title,
      price,
      audio_url: url,
      user_id: user.data.user.id
    });

  if (dbError) return alert(dbError.message);

  alert("Upload success");
  loadSongs();
}

// ---------------- LOAD FEED ----------------
async function loadSongs() {
  const { data, error } = await supabase
    .from("songs")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");

  if (error) {
    feed.innerHTML = "Error loading songs";
    return;
  }

  feed.innerHTML = data.map(song => `
    <div class="card">
      <h3>${song.title}</h3>
      <p>$${song.price}</p>
      <audio controls src="${song.audio_url}"></audio>
    </div>
  `).join("");
}

// auto load feed
loadSongs();

</script>

</body>
</html>
