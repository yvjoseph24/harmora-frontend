<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harmora</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:Arial; background:#0a0015; color:white; }

.layout { display:flex; }

.sidebar {
  width:220px;
  height:100vh;
  background:#000;
  padding:15px;
}

.main { flex:1; padding:20px; }

.card {
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border-left:3px solid #00f5ff;
}

button {
  width:100%;
  padding:10px;
  background:linear-gradient(90deg,#00f5ff,#b400ff);
  border:none;
  font-weight:bold;
  cursor:pointer;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
  background:#111;
  border:1px solid #333;
  color:white;
}

#player {
  position:fixed;
  bottom:0;
  left:220px;
  right:0;
  height:45px;
  background:#000;
  display:flex;
  align-items:center;
  padding:0 10px;
  border-top:1px solid #00f5ff33;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h3>🎧 Harmora</h3>
<button onclick="loadSongs()">Explore</button>
<button onclick="loadArtists()">Artists</button>
</div>

<div class="main">

<h3>🌟 Artist Motivation</h3>
<p>Build your sound. Upload music. Get paid directly.</p>

<h3>🎤 Create Artist</h3>
<input id="artistName" placeholder="Name">
<input id="artistBio" placeholder="Bio">
<button onclick="createArtist()">Create</button>

<h3>🎧 Upload Song</h3>
<input id="songTitle" placeholder="Title">
<input id="songPrice" placeholder="Price">
<input id="songFile" type="file">
<button onclick="uploadSong()">Upload</button>

<h3>🔥 Marketplace</h3>
<div id="songs"></div>

<h3>🎤 Artists</h3>
<div id="artists"></div>

</div>

</div>

<div id="player">
<div id="trackName">No track</div>
<button onclick="toggle()">▶</button>
<audio id="audio"></audio>
</div>

<script src="app.js"></script>

</body>
</html>
